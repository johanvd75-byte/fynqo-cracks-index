name: Publish to PyPI

# Tag-triggered build + PyPI publish via Trusted Publishing (OIDC).
# No PyPI token needed — uses pypa/gh-action-pypi-publish with id-token: write.
#
# Setup (one-time, Johan-only):
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a "Pending publisher" with:
#        - PyPI project name: fynqo-cracks-index
#        - Owner:             johanvd75-byte
#        - Repository name:   fynqo-cracks-index
#        - Workflow name:     pypi-publish.yml
#        - Environment name:  pypi
#   3. Create environment `pypi` on the repo (Settings -> Environments).
#
# Cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
#   gh release create v0.1.0 --title "fynqo-cracks-index v0.1.0" --notes "..."

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fynqo-cracks-index
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
